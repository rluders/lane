name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GOWORK: off

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify release branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Releases can only be created from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          if [ -z "${latest_tag}" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          patch="${rest#*.}"

          case "${BUMP}" in
            patch)
              patch=$((patch + 1))
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            *)
              echo "Unsupported bump type: ${BUMP}" >&2
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "next_tag=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "Next release: ${next_tag}"

      - name: Create and push tag
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          if git rev-parse "${NEXT_TAG}" >/dev/null 2>&1; then
            echo "Tag ${NEXT_TAG} already exists." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${NEXT_TAG}"
          git push origin "${NEXT_TAG}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: gh release create "${NEXT_TAG}" --generate-notes --verify-tag
